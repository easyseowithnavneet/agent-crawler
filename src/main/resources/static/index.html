<!DOCTYPE html>
<html>
<head>
    <title>SEO Crawler Tool</title>

    <!-- 🚫 Disable cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 300px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
            white-space: pre-wrap;
            text-align: left;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            background: #f4f4f4;
            padding: 15px;
            border-radius: 10px;
            height: 300px;
            overflow-y: scroll;
        }
    </style>
</head>

<body>

<h1>🚀 SEO Crawler Tool</h1>

<!-- ✅ URL INPUT -->
<input type="text" id="url" placeholder="Enter Website URL" />

<br>

<!-- ✅ MAX PAGES INPUT (THIS WAS MISSING ❗) -->
<input type="number" id="max" placeholder="Max Pages (e.g. 50)" />

<br>

<!-- ✅ START BUTTON -->
<button onclick="startCrawl()">Start Crawl</button>

<!-- ✅ STATUS OUTPUT -->
<pre id="output">Waiting...</pre>

<!-- ✅ DOWNLOAD -->
<button onclick="downloadCSV()">⬇ Download Report</button>

<script>

let interval;

function startCrawl() {

    const url = document.getElementById("url").value;
    const max = document.getElementById("max").value || 50;

    if (!url) {
        alert("Enter URL first");
        return;
    }

    // ✅ CALL CORRECT API
    fetch(`/start?url=${encodeURIComponent(url)}&max=${max}`)
        .then(res => res.text())
        .then(data => {
            document.getElementById("output").innerText = data;

            // 🔁 Start polling status
            if (interval) clearInterval(interval);

            interval = setInterval(() => {

                fetch('/status')
                    .then(res => res.json())
                    .then(data => {

                        let text = "";

                        text += "Running: " + data.running + "\n";
                        text += "Pages Crawled: " + data.pagesCrawled + "\n\n";

                        if (data.logs) {
                            text += data.logs.join("\n");
                        }

                        document.getElementById("output").innerText = text;

                    });

            }, 2000);

        });
}

function downloadCSV() {
    window.open("/download");
}

</script>

</body>
</html>
