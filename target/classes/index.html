<!DOCTYPE html>
<html>
<head>
    <title>SEO Crawler</title>
</head>
<body style="font-family: Arial; text-align:center; margin-top:50px;">

<h1>🚀 SEO Crawler Tool</h1>

<!--<input type="text" id="url" placeholder="Enter website URL" size="40"/>-->
<input type="text" id="url" placeholder="Enter website URL"/>
<br><br>
<input type="number" id="max" placeholder="Max Pages (e.g. 50)" />
<br><br>

<button onclick="startCrawl()">Start Crawl</button>

<h2 id="status">Status: Idle</h2>

<br>
<button onclick="downloadCSV()">⬇ Download Report</button>
<pre id="output"></pre>
<script>

let interval;

function startCrawl() {

    const url = document.getElementById("url").value;
    const max = document.getElementById("max").value || 50;

    if (!url) {
        alert("Enter URL first");
        return;
    }

    fetch(`/start?url=${encodeURIComponent(url)}&max=${max}`)
        .then(res => res.text())
        .then(data => {

            document.getElementById("output").innerText = data;

            if (interval) clearInterval(interval);

            interval = setInterval(() => {
                fetch('/status')
                    .then(res => res.json())
                    .then(data => {

                        document.getElementById("output").innerText =
                            "Running: " + data.running + "\n" +
                            "Pages Crawled: " + data.pagesCrawled + "\n\n" +
                            data.logs.join("\n");

                        if (!data.running) {
                            clearInterval(interval);
                        }

                    });
            }, 2000);

        });
}

function downloadCSV() {
    window.open("/download");
}

</script>
